<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>For 阮阮 ✦</title>
    <style>
        /* =========================================
           CSS Styles
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Prevent default touch actions like scrolling */
        }

        body {
            background-color: #000000;
            overflow: hidden;
            font-family: "Times New Roman", serif; /* Elegant font */
            color: #e0e0e0;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        /* Top Left Title */
        .header-title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* Audio Control */
        .audio-control {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            pointer-events: auto;
            color: rgba(255, 255, 255, 0.6);
            font-size: 20px;
            transition: color 0.3s;
            z-index: 20;
        }
        .audio-control:hover {
            color: #ffffff;
        }

        /* Center Message */
        .center-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            letter-spacing: 3px;
            color: #ffffff;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            width: 80%;
        }

        /* Easter Egg Message */
        .easter-egg {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace; /* Typewriter style */
            color: rgba(200, 200, 255, 0.8);
            opacity: 0;
            transition: opacity 1s ease-in-out;
            text-align: center;
            pointer-events: none;
        }

        /* Interaction Hint (Optional, fades out) */
        .hint {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            animation: pulse 3s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.5; }
            100% { opacity: 0.2; }
        }

        /* Loading Screen */
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

    <!-- Audio Elements -->
    <!-- Note: Browsers require user interaction to play audio. The mute button handles this. -->
    <audio id="bgm" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <audio id="sfx-chime">
        <source src="chime.mp3" type="audio/mpeg">
    </audio>

    <!-- Loading Screen -->
    <div id="loading">
        <div style="color: #666; font-size: 12px; letter-spacing: 2px;">LOADING STARDUST...</div>
    </div>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="header-title">For 阮阮 ✦</div>
        <div class="audio-control" id="audio-btn">🔇</div>
        <div class="center-message" id="main-text">它从未真正离开，只是换一种方式在你身边。</div>
        <div class="easter-egg" id="secret-text">Love is the one thing that transcends time and space.</div>
        <div class="hint" id="hint-text">Press & Hold to Remember</div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Import Three.js as a module -->
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // =========================================
        // Configuration
        // =========================================
        const CONFIG = {
            particleCount: 4500,
            galaxyColor: 0xffffff,
            bgColor: 0x000000,
            catColor: 0xffffff, // Brighter white when formed
            particleSizeBase: 0.08, // Base size scaling
            transitionSpeed: 0.03, // Speed of particles moving to target
            noiseStrength: 0.02, // Idle drift amount
            mouseForce: 0.5, // Mouse disturbance in galaxy mode
        };

        // =========================================
        // State Management
        // =========================================
        const STATE = {
            isPressed: false, // Mouse down or touch start
            formationProgress: 0, // 0 to 1 (0 = Galaxy, 1 = Cat)
            isCatFormed: false,
            time: 0,
            mouseX: 0,
            mouseY: 0,
            isAudioOn: false,
            hoveringSecretZone: false,
            secretTimer: 0,
            catStableTimer: 0
        };

        // =========================================
        // Initialization
        // =========================================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(CONFIG.bgColor);
        scene.fog = new THREE.FogExp2(CONFIG.bgColor, 0.03); // Depth fog

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 20;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // =========================================
        // Particle System Generation
        // =========================================
        
        // Geometry Data Arrays
        const positions = new Float32Array(CONFIG.particleCount * 3);
        const galaxyTargets = new Float32Array(CONFIG.particleCount * 3);
        const catTargets = new Float32Array(CONFIG.particleCount * 3);
        const sizes = new Float32Array(CONFIG.particleCount);
        const colors = new Float32Array(CONFIG.particleCount * 3);
        const brightness = new Float32Array(CONFIG.particleCount); // For twinkling
        const phases = new Float32Array(CONFIG.particleCount); // Random phase for animation

        const color1 = new THREE.Color(0xBFBFBF); // Dim silver
        const color2 = new THREE.Color(0xFFFFFF); // Bright white
        const color3 = new THREE.Color(0xF5F5F5); // Off white

        // --- 1. Generate Galaxy Shape (Diagonal Band) ---
        for (let i = 0; i < CONFIG.particleCount; i++) {
            const i3 = i * 3;

            // Diagonal distribution: x roughly equals -y
            // Spread along the line y = -x
            // We create a long bounding box rotated 45 degrees
            
            const spreadX = (Math.random() - 0.5) * 40;
            const spreadY = (Math.random() - 0.5) * 20;
            const spreadZ = (Math.random() - 0.5) * 15;

            // Rotate 45 degrees to make it diagonal
            // x' = x cos - y sin
            // y' = x sin + y cos
            const angle = Math.PI / 4;
            const x = spreadX * Math.cos(angle) - spreadY * Math.sin(angle);
            const y = spreadX * Math.sin(angle) + spreadY * Math.cos(angle);
            const z = spreadZ;

            // Store Galaxy Target
            galaxyTargets[i3] = x;
            galaxyTargets[i3 + 1] = y;
            galaxyTargets[i3 + 2] = z;

            // Initial Position (same as galaxy)
            positions[i3] = x;
            positions[i3 + 1] = y;
            positions[i3 + 2] = z;

            // Size & Color Logic
            const r = Math.random();
            let size, col;

            if (r > 0.95) {
                // Bright Star
                size = 4.0;
                col = color2;
                brightness[i] = 1.0;
            } else if (r > 0.7) {
                // Normal Star
                size = 2.0;
                col = color3;
                brightness[i] = 0.8;
            } else {
                // Dust
                size = 1.0;
                col = color1;
                brightness[i] = 0.5;
            }

            sizes[i] = size * CONFIG.particleSizeBase;
            colors[i3] = col.r;
            colors[i3 + 1] = col.g;
            colors[i3 + 2] = col.b;
            phases[i] = Math.random() * Math.PI * 2;
        }

        // --- 2. Generate Cat Shape (Procedural) ---
        // Cat logic: Head (circle), Body (ellipse), Ears (triangles), Tail (curve)
        
        let pIndex = 0;

        function addPointToCat(x, y, z) {
            if (pIndex >= CONFIG.particleCount) return;
            const i3 = pIndex * 3;
            catTargets[i3] = x;
            catTargets[i3 + 1] = y;
            catTargets[i3 + 2] = z;
            pIndex++;
        }

        // Helper: Random point in circle
        function randomInCircle(radius, centerX, centerY) {
            const r = radius * Math.sqrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            return {
                x: centerX + r * Math.cos(theta),
                y: centerY + r * Math.sin(theta)
            };
        }

        // 2.1 Head (Sphere/Circle projection)
        const headCount = Math.floor(CONFIG.particleCount * 0.25);
        for (let i = 0; i < headCount; i++) {
            const p = randomInCircle(3.5, 0, 4); // Head center (0, 4)
            addPointToCat(p.x, p.y, (Math.random() - 0.5) * 2); // Slight Z depth
        }

        // 2.2 Body (Ellipse)
        const bodyCount = Math.floor(CONFIG.particleCount * 0.45);
        for (let i = 0; i < bodyCount; i++) {
            // Ellipse: (x/a)^2 + (y/b)^2 <= 1
            // Body center (0, -2)
            const a = 4.0; // Width radius
            const b = 5.5; // Height radius
            
            // Rejection sampling for ellipse
            let px, py;
            do {
                px = (Math.random() - 0.5) * 2 * a;
                py = (Math.random() - 0.5) * 2 * b;
            } while ((px*px)/(a*a) + (py*py)/(b*b) > 1);

            addPointToCat(px, py - 3, (Math.random() - 0.5) * 3);
        }

        // 2.3 Ears (Triangles)
        const earCount = Math.floor(CONFIG.particleCount * 0.1);
        for (let i = 0; i < earCount; i++) {
            // Left Ear
            // Base on head (-2, 6) to (-1, 7), Tip (-2.5, 8.5) approx
            // Simple triangle random point
            const side = Math.random() > 0.5 ? 1 : -1; // Left or Right
            
            // Triangle coordinates relative to head top
            // A: (-2.5, 6), B: (-0.5, 6.5), C: (-2.8, 9)
            const r1 = Math.random();
            const r2 = Math.random();
            
            // Barycentric coordinates
            const sqrtR1 = Math.sqrt(r1);
            const A = 1 - sqrtR1;
            const B = sqrtR1 * (1 - r2);
            const C = sqrtR1 * r2;

            // Left Ear Coords
            const lx1 = -2.8, ly1 = 5.5;
            const lx2 = -0.8, ly2 = 6.5;
            const lx3 = -3.2, ly3 = 8.5;

            let ex = A * lx1 + B * lx2 + C * lx3;
            let ey = A * ly1 + B * ly2 + C * ly3;

            // Mirror for right ear if side is 1
            if (side === 1) {
                ex = -ex;
            }

            addPointToCat(ex, ey, (Math.random() - 0.5) * 1);
        }

        // 2.4 Tail (Sine Wave / Bezier)
        const tailCount = CONFIG.particleCount - pIndex; // Remaining particles
        for (let i = 0; i < tailCount; i++) {
            const t = i / tailCount; // 0 to 1
            // Tail starts at bottom right of body approx (2, -6)
            // Curves up to (5, -2)
            
            const startX = 2;
            const startY = -6;
            
            // Simple curve function
            const tx = startX + t * 4 + Math.sin(t * Math.PI) * 1;
            const ty = startY + t * 5 + Math.cos(t * Math.PI * 1.5) * 2;
            
            // Add thickness to tail
            const thickness = 0.6 * (1 - t * 0.5); // Taper slightly
            const jitterX = (Math.random() - 0.5) * thickness;
            const jitterY = (Math.random() - 0.5) * thickness;

            addPointToCat(tx + jitterX, ty + jitterY, (Math.random() - 0.5) * 1);
        }

        // =========================================
        // Three.js Object Creation
        // =========================================
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        // Custom Shader Material for better control over twinkling and size
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                pixelRatio: { value: renderer.getPixelRatio() }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 color;
                varying vec3 vColor;
                uniform float time;
                uniform float pixelRatio;

                void main() {
                    vColor = color;
                    
                    // Add simple breathing/twinkle effect based on position and time
                    float twinkle = 0.8 + 0.2 * sin(time * 2.0 + position.x + position.y);
                    
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * pixelRatio * (300.0 / -mvPosition.z) * twinkle;
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                
                void main() {
                    // Circular particle
                    vec2 coord = gl_PointCoord - vec2(0.5);
                    if(length(coord) > 0.5) discard;
                    
                    // Soft edge glow
                    float strength = 1.0 - (length(coord) * 2.0);
                    strength = pow(strength, 1.5);
                    
                    gl_FragColor = vec4(vColor, strength);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // =========================================
        // Interaction Logic
        // =========================================
        
        // Mouse / Touch Handlers
        function onStart(e) {
            STATE.isPressed = true;
            document.getElementById('hint-text').style.opacity = '0';
        }

        function onEnd(e) {
            STATE.isPressed = false;
        }

        function onMove(e) {
            let x, y;
            if (e.touches) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            // Normalize mouse to -1 to 1
            STATE.mouseX = (x / window.innerWidth) * 2 - 1;
            STATE.mouseY = -(y / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('mousedown', onStart);
        window.addEventListener('touchstart', onStart, {passive: false});
        
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);
        
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive: false});

        // Audio Control
        const btn = document.getElementById('audio-btn');
        const bgm = document.getElementById('bgm');
        const chime = document.getElementById('sfx-chime');

        btn.addEventListener('click', () => {
            STATE.isAudioOn = !STATE.isAudioOn;
            btn.textContent = STATE.isAudioOn ? '🔊' : '🔇';
            if (STATE.isAudioOn) {
                bgm.volume = 0.3;
                bgm.play().catch(e => console.log("Audio play failed", e));
            } else {
                bgm.pause();
            }
        });

        // =========================================
        // Animation Loop
        // =========================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            STATE.time += delta;
            material.uniforms.time.value = STATE.time;

            // Update Formation Progress
            if (STATE.isPressed) {
                STATE.formationProgress += delta * 0.8; // Form speed
            } else {
                STATE.formationProgress -= delta * 0.5; // Dissolve speed
            }
            STATE.formationProgress = Math.max(0, Math.min(1, STATE.formationProgress));

            // Check Cat Formed State
            const wasCatFormed = STATE.isCatFormed;
            STATE.isCatFormed = STATE.formationProgress > 0.95;

            // Trigger Chime once
            if (STATE.isCatFormed && !wasCatFormed && STATE.isAudioOn) {
                chime.volume = 0.5;
                chime.currentTime = 0;
                chime.play().catch(() => {});
            }

            // Update Text UI
            const mainText = document.getElementById('main-text');
            if (STATE.isCatFormed) {
                STATE.catStableTimer += delta;
                if (STATE.catStableTimer > 3.0) {
                    mainText.style.opacity = 1;
                }
            } else {
                STATE.catStableTimer = 0;
                mainText.style.opacity = 0;
            }

            // Easter Egg Logic
            // Check if mouse is in bottom center area (approx y: -0.3 to -0.8, x: -0.3 to 0.3)
            const inZone = STATE.mouseX > -0.3 && STATE.mouseX < 0.3 && STATE.mouseY < -0.3 && STATE.mouseY > -0.8;
            
            if (STATE.isCatFormed && inZone) {
                STATE.secretTimer += delta;
            } else {
                STATE.secretTimer = 0;
            }

            const secretText = document.getElementById('secret-text');
            if (STATE.secretTimer > 2.0) {
                secretText.style.opacity = 1;
            } else {
                secretText.style.opacity = 0;
            }

            // --- Particle Physics & Interpolation ---
            const posAttr = geometry.attributes.position;
            const positionsArray = posAttr.array;

            // Mouse Raycaster logic for 3D disturbance
            // Map 2D mouse to 3D plane at Z=0 roughly
            const mouseVec = new THREE.Vector3(STATE.mouseX * 15, STATE.mouseY * 10, 0);

            for (let i = 0; i < CONFIG.particleCount; i++) {
                const i3 = i * 3;

                // 1. Get Targets
                const gx = galaxyTargets[i3];
                const gy = galaxyTargets[i3 + 1];
                const gz = galaxyTargets[i3 + 2];

                const cx = catTargets[i3];
                const cy = catTargets[i3 + 1];
                const cz = catTargets[i3 + 2];

                // 2. Interpolate Target based on progress
                // We use a cubic ease-in-out for smoother transition
                const t = STATE.formationProgress;
                const easeT = t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                let tx = gx + (cx - gx) * easeT;
                let ty = gy + (cy - gy) * easeT;
                let tz = gz + (cz - gz) * easeT;

                // 3. Add Noise / Floating (Breathing)
                // Different noise for Galaxy vs Cat
                const phase = phases[i];
                
                if (t < 0.5) {
                    // Galaxy Drift
                    tx += Math.sin(STATE.time * 0.5 + phase) * 0.5;
                    ty += Math.cos(STATE.time * 0.3 + phase) * 0.5;
                } else {
                    // Cat Breathing
                    const breath = Math.sin(STATE.time * 2) * 0.05; // Expand/Contract
                    tx *= (1 + breath);
                    ty *= (1 + breath);
                }

                // 4. Mouse Disturbance (Only in Galaxy mode mostly)
                if (t < 0.8) {
                    const dx = positionsArray[i3] - mouseVec.x;
                    const dy = positionsArray[i3 + 1] - mouseVec.y;
                    const distSq = dx*dx + dy*dy;
                    
                    if (distSq < 20) { // Radius of influence
                        const force = (20 - distSq) * CONFIG.mouseForce * 0.01;
                        // Repel slightly
                        tx += dx * force;
                        ty += dy * force;
                        // Or swirl? Let's stick to simple repel/displace for "fluid" feel
                    }
                }

                // 5. Physics Update (Spring/Lerp towards target)
                // Current pos
                const px = positionsArray[i3];
                const py = positionsArray[i3 + 1];
                const pz = positionsArray[i3 + 2];

                // Simple Lerp for stability, but with varying speed based on distance
                // This simulates velocity without full physics engine overhead
                positionsArray[i3] += (tx - px) * 0.1;
                positionsArray[i3 + 1] += (ty - py) * 0.1;
                positionsArray[i3 + 2] += (tz - pz) * 0.1;
            }

            posAttr.needsUpdate = true;

            // Camera slight parallax based on mouse
            camera.position.x += (STATE.mouseX * 2 - camera.position.x) * 0.05;
            camera.position.y += (STATE.mouseY * 2 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.pixelRatio.value = renderer.getPixelRatio();
        });

        // Start
        document.getElementById('loading').style.opacity = 0;
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1000);
        
        animate();

    </script>
</body>
</html>
